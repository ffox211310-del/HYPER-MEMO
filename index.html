<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>どこでも推し撮影AR</title>

<style>
body {
  margin: 0;
  overflow: hidden;
}

#video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#overlay {
  position: absolute;
  width: 150px;
  top: 100px;
  left: 100px;
  cursor: grab;
}

#ui {
  position: fixed;
  bottom: 10px;
  left: 10px;
  background: rgba(0,0,0,0.5);
  padding: 10px;
  border-radius: 10px;
  color: white;
}
</style>

</head>
<body>

<!-- カメラ -->
<video id="video" autoplay playsinline></video>

<!-- 重ねる画像 -->
<img id="overlay">

<!-- UI -->
<div id="ui">
  <input type="file" id="file"><br>
  サイズ：<input type="range" id="size" min="50" max="1000" value="150"><br>
  <button onclick="capture()">撮影</button>
</div>

<!-- 合成用 -->
<canvas id="canvas" style="display:none;"></canvas>

<script>
// =========================
// 要素取得
// =========================
const video = document.getElementById("video");
const overlay = document.getElementById("overlay");
const sizeSlider = document.getElementById("size");

// =========================
// ① 外カメラ起動
// =========================
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { exact: "environment" } }
})
.then(stream => video.srcObject = stream)
.catch(() => {
  // fallback
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  }).then(stream => video.srcObject = stream);
});

// =========================
// ② 画像選択
// =========================
document.getElementById("file").addEventListener("change", e => {
  const file = e.target.files[0];
  overlay.src = URL.createObjectURL(file);
});

// =========================
// ③ サイズ変更
// =========================
sizeSlider.addEventListener("input", () => {
  overlay.style.width = sizeSlider.value + "px";
});

// =========================
// ④ ドラッグ（PC）
// =========================
let isDragging = false;
let offsetX = 0;
let offsetY = 0;

overlay.addEventListener("mousedown", e => {
  isDragging = true;
  offsetX = e.offsetX;
  offsetY = e.offsetY;
});

document.addEventListener("mousemove", e => {
  if (!isDragging) return;
  overlay.style.left = (e.clientX - offsetX) + "px";
  overlay.style.top = (e.clientY - offsetY) + "px";
});

document.addEventListener("mouseup", () => {
  isDragging = false;
});

// =========================
// ⑤ ドラッグ（スマホ）
// =========================
overlay.addEventListener("touchstart", e => {
  const touch = e.touches[0];
  const rect = overlay.getBoundingClientRect();

  offsetX = touch.clientX - rect.left;
  offsetY = touch.clientY - rect.top;

  isDragging = true;
});

document.addEventListener("touchmove", e => {
  if (!isDragging) return;

  const touch = e.touches[0];

  overlay.style.left = (touch.clientX - offsetX) + "px";
  overlay.style.top = (touch.clientY - offsetY) + "px";
});

document.addEventListener("touchend", () => {
  isDragging = false;
});

// =========================
// ⑥ 撮影（ズレ修正あり）
// =========================
function capture(){
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const videoRect = video.getBoundingClientRect();
  const overlayRect = overlay.getBoundingClientRect();

  const vw = video.videoWidth;
  const vh = video.videoHeight;

  canvas.width = vw;
  canvas.height = vh;

  // ===== ここが超重要 =====
  // object-fit: cover のズレ補正
  const aspectVideo = vw / vh;
  const aspectScreen = videoRect.width / videoRect.height;

  let sx = 0, sy = 0, sw = vw, sh = vh;

  if (aspectScreen > aspectVideo) {
    // 横に広い → 上下カット
    sh = vw / aspectScreen;
    sy = (vh - sh) / 2;
  } else {
    // 縦に長い → 左右カット
    sw = vh * aspectScreen;
    sx = (vw - sw) / 2;
  }

  // カメラ描画（トリミングあり）
  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);

  // ===== overlayの補正 =====
  const scaleX = canvas.width / videoRect.width;
  const scaleY = canvas.height / videoRect.height;

  ctx.globalAlpha = overlay.style.opacity || 1;

  ctx.drawImage(
    overlay,
    (overlayRect.left - videoRect.left) * scaleX,
    (overlayRect.top - videoRect.top) * scaleY,
    overlay.width * scaleX,
    overlay.height * scaleY
  );

  ctx.globalAlpha = 1;

  const link = document.createElement("a");
  link.download = "ar.png";
  link.href = canvas.toDataURL();
  link.click();
  }

</script>

</body>
</html>
